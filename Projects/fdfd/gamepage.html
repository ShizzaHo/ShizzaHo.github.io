<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/4.5.0/firebase.js"></script>
    <script src="scripts/FireBaseAuth.js"></script>
    <script src="scripts/game.js"></script>
    <script src="scripts/sandbox.js"></script>
    <link rel="stylesheet" href="styles/ui.css">
    <link rel="stylesheet" href="styles/ui_tech.css">
    <link rel="stylesheet" href="styles/animate.css">
    <link rel="stylesheet" href="styles/alter_anim.css">

    <script>
        vkBridge.send('VKWebAppInit');
    </script>

</head>
<body>

    <div class="loader">
    </div>

    <div class="menu" onclick="close_menu()">
        <div class="menu_panel">
            <div class="menu_panel_footer">
                <p class="menu_footer_text">Меню</p>
            </div>

            <div style="height: 54px;"></div>

            <div style="bottom: 0;">
                <div class="element_menu" onclick="charge_page(1)">
                    Профиль
                </div>

                <div class="element_menu" onclick="charge_page(2)">
                    Покормить Паймон
                </div>

                <div class="element_menu" onclick="charge_page(3)">
                    Ивенты
                </div>

                <div class="element_menu" onclick="charge_page(4)">
                    Топ кормильцев
                </div>

                <div class="element_menu" onclick="charge_page(5)">
                    Об игре...
                </div>
            </div>
        </div>
    </div>

    <div class="page_myaccount">

        <div class="top_ft">
            <div class="avatar"></div>
            <p class="top_ft_text">Имя Фамилия</p>
            <p class="top_ft_text2">Уровень: 0 (0/100)</p>
        </div>

        <div class="content">
            <div class="box">
                <p style="font-size: 18px; font-weight: 600; padding: 10px; margin: 15px 0px 0px 0px;">Ваши богатства:</p>
                <div class="reso">
                    <div class="type_reso">
                        <img src="styles/images/mora.png" width="64" height="64"> <p class="type_reso_text moras">0</p>
                    </div>
                    <div class="type_reso">
                        <img src="styles/images/pr.png" width="64" height="64"> <p class="type_reso_text primos">0</p>
                    </div>
                    <br>
                </div>
        </div>

        <div class="content">
            <div class="box">
                <p style="font-size: 18px; font-weight: 600; padding: 10px; margin: 15px 0px 0px 0px;">Улучшения:</p>
                <div class="reso">
                    <br>
                </div>


            </div>

        </div>

        <footer class="bottom_box">
            <button class="hutao-ui-button up_a">Начать кормить Паймон</button>
            <button class="hutao-ui-button up_a" id="menu_button" onclick="open_menu()" style="padding-left: 22px; padding-left: 22px; margin-left: 8px">
                Меню
            </button>
        </footer>

    </div>
    </div>

    <div class="page_paimon">

        <div class="level_info">

            <div class="level_base">
                <div class="level_shar"></div>
            </div>

        </div>

        <div class="content_paimon">
            <div class="paimon_emotion">
                <img src="styles/images/paimon_1.png" class="paimon" width="226" height="247">
                <p style="margin-top: 8px;">Вопрос от паймон</p>
            </div>
            <div class="paimon_eat">
                <img src="styles/images/pr.png" class="" width="139" height="133">
                <p style="margin-top: 8px;">Название еды</p>
            </div>
        </div>

        <div class="green_panel"></div>

        <div class="red_panel"></div>

        <div class="left_ar">
            <img src="styles/images/no_p.png" width="31" height="51">
        </div>

        <div class="right_ar">
            <img src="styles/images/yes_p.png" width="31" height="51">
        </div>

        <footer class="bottom_box">
            <button class="hutao-ui-button up_a" id="menu_button" onclick="charge_page(1)" style="padding-left: 22px; padding-left: 22px; margin-left: 8px">
                Назад
            </button>
        </footer>

    </div>

    <div class="page_top">
        top gamer page (in dev...)

        <footer class="bottom_box">
            <button class="hutao-ui-button up_a" id="menu_button" onclick="charge_page(1)" style="padding-left: 22px; padding-left: 22px; margin-left: 8px">
                Назад
            </button>
        </footer>
    </div>

    <div class="page_eventlist">
        event list page (in dev...)

        <footer class="bottom_box">
            <button class="hutao-ui-button up_a" id="menu_button" onclick="charge_page(1)" style="padding-left: 22px; padding-left: 22px; margin-left: 8px">
                Назад
            </button>
        </footer>

    </div>

    <div class="page_info">
        info page (in dev...)

        <footer class="bottom_box">
            <button class="hutao-ui-button up_a" id="menu_button" onclick="charge_page(1)" style="padding-left: 22px; padding-left: 22px; margin-left: 8px">
                Назад
            </button>
        </footer>

    </div>

</body>
</html>
