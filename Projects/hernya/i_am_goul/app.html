<html>
  
<head>
  <title>Я гуль. [ 0.2 ]</title>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
</head>

<body>

  <h1 id="tx">Я... Гуль...</h1>

  <style>

  @import url('https://fonts.googleapis.com/css2?family=Spectral+SC:wght@200;600&display=swap');

    /*audio {display:none;}*/

    body{
      color: red;
      background-color: black;
      background: linear-gradient(359.82deg, #000000 0.84%, rgba(0, 0, 0, 0.35) 99.83%), url(http://viewout.ru/001/tokyo_ghoul.jpg) center right no-repeat fixed;
      -webkit-background-size: cover;
      -moz-background-size: cover;
      -o-background-size: cover;
      background-size: cover; 

      padding: 1em;
      position: absolute;
      top: 50%;
      left: 50%;
      margin-right: -50%;
      transform: translate(-50%, -50%);

      -webkit-touch-callout: none;
      -webkit-user-select: none;  
      -khtml-user-select: none;   
      -moz-user-select: none;     
      -ms-user-select: none;       
      user-select: none;    

      font-family: 'Spectral SC', serif;
    }

    h1{
      font-size: 100;
    }
  </style>

  <script>
    'use strict';

    var num = 1000;
    var numex = 7;

    function goul_start()
    {
      setTimeout(goul, 50);
    }

    function goul()
    {
    if(num > -1)
    {
      num = num - numex;
      document.getElementById("tx").innerHTML = num;
      setTimeout(goul_start, 1);
    }
    else
    {
      document.getElementById("tx").innerHTML = "Ты гуль.";
    }
    }

    setTimeout(goul_start, 1000);
  </script>

</body>

</html>
