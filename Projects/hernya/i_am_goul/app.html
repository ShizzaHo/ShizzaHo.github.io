<body>

  <h1 id="tx">Я... Гуль.</h1>

  <style>
    body{
      color: red;
      background-color: black;
      background-image: url(https://awesomereviews.ru/wp-content/uploads/2018/07/%D0%9A%D0%B0%D0%BD%D1%8D%D0%BA%D0%B8-%D0%9A%D1%8D%D0%BD-752x440.jpg);
      background-size: 100%;
    }

    h1{
      font-size: 100;
    }
  </style>

  <script>
    'use strict';

    var num = 1000;
    var numex = 7;

    function goul_start()
    {
      setTimeout(goul, 50);
    }

    function goul()
    {
    if(num > -1)
    {
      num = num - numex;
      document.getElementById("tx").innerHTML = num;
      setTimeout(goul_start, 50);
    }
    else
    {
      document.getElementById("tx").innerHTML = "Ты гуль.";
    }
    }

    setTimeout(goul_start, 1000);
  </script>
